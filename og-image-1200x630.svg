<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans CJK TC','Noto Sans TC',sans-serif">
  <defs>
    <radialGradient id="glow1" cx="20%" cy="10%" r="60%">
      <stop offset="0%" stop-color="#6dbd9f" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#6dbd9f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="95%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#6699bd" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#6699bd" stop-opacity="0"/>
