    <text x="0" y="318" fill="#8fb8a8" font-size="20" letter-spacing="4" font-weight="500">BIBLIOTHECA TEXTILIS</text>

    <text x="0" y="378" fill="#f3f0e8" font-size="58" font-weight="800" letter-spacing="1">編織圖圖書館</text>
