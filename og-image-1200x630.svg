    <text x="60" y="239" fill="#8fb8a8" font-size="14" font-weight="600">2024 / 04</text>
    <g transform="translate(60,252)">
      <rect x="0" y="0" width="118" height="86" rx="8" fill="#152e2c"/>
      <rect x="0" y="62" width="118" height="24" rx="8" fill="#1d3f38"/>
      <rect x="10" y="70" width="50" height="8" rx="4" fill="#3f6e63"/>
      <rect x="132" y="0" width="118" height="86" rx="8" fill="#13312c"/>
      <rect x="132" y="62" width="118" height="24" rx="8" fill="#1d3f38"/>
      <rect x="142" y="70" width="50" height="8" rx="4" fill="#3f6e63"/>
