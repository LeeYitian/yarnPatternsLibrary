      <path d="M 24 50 C 32 28, 60 28, 68 50" fill="none" stroke="#6dbd9f" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <path d="M 14 46 Q 46 70 78 46" fill="none" stroke="#6dbd9f" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <line x1="50" y1="14" x2="68" y2="-18" stroke="#6dbd9f" stroke-width="3" stroke-linecap="round"/>
      <circle cx="68" cy="-18" r="4.5" fill="#6dbd9f"/>
