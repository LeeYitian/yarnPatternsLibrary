      <rect x="142" y="70" width="50" height="8" rx="4" fill="#3f6e63"/>
      <rect x="264" y="0" width="118" height="86" rx="8" fill="#13312c"/>
      <rect x="264" y="62" width="118" height="24" rx="8" fill="#1d3f38"/>
      <rect x="274" y="70" width="50" height="8" rx="4" fill="#3f6e63"/>
