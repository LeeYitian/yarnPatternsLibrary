      <stop offset="0%" stop-color="#6dbd9f" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6dbd9f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="96%" r="45%">
