<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>織圖圖書館</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  :root {
    --bg1: #d7e6dd; --bg2: #cfdde8; --bg3: #dde6dc;
    --card: rgba(255,255,255,.6); --card-solid: #eef4ef;
    --ink: #20302b; --muted: #5d716a; --line: rgba(70,120,100,.26);
    --accent: #4f9a80; --accent2: #6699bd;
    --shadow: 0 10px 34px rgba(40,75,62,.16);
    --shadow-lg: 0 22px 54px rgba(30,60,48,.26);
    /* 頁面左右留白：給兩側浮動篩選按鈕的空間，內容往內縮 */
    --gutter: clamp(20px, 7vw, 112px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg1: #07120f; --bg2: #070f15; --bg3: #081210;
      --card: rgba(26,38,35,.52); --card-solid: #141f1c;
      --ink: #e7f0ec; --muted: #92a69f; --line: rgba(150,185,172,.13);
      --accent: #6dbd9f; --accent2: #84b6d6;
      --shadow: 0 14px 40px rgba(0,0,0,.5); --shadow-lg: 0 26px 64px rgba(0,0,0,.62);
    }
  }
  * { box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    margin: 0; color: var(--ink);
    font-family: "Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    -webkit-font-smoothing: antialiased;
    background:
      radial-gradient(1100px 720px at 8% -10%, color-mix(in srgb, var(--accent) 26%, transparent), transparent 58%),
      radial-gradient(1000px 720px at 100% -4%, color-mix(in srgb, var(--accent2) 26%, transparent), transparent 54%),
      radial-gradient(900px 600px at 50% 118%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 60%),
      linear-gradient(168deg, var(--bg1), var(--bg2) 52%, var(--bg3));
    background-repeat: no-repeat;
    background-attachment: fixed;
  }

  header {
    position: sticky; top: 0; z-index: 20;
    background: color-mix(in srgb, var(--bg1) 70%, transparent);
    backdrop-filter: blur(14px) saturate(1.2);
    border-bottom: 1px solid var(--line);
    padding: 14px var(--gutter); display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    transition: transform .28s ease;
  }
  header.nav-hidden { transform: translateY(-100%); }

  /* 手機版：搜尋欄自己一行，三顆按鈕一行 */
  @media (max-width: 600px) {
    :root { --gutter: 16px; }
    header { padding: 12px var(--gutter); gap: 10px 8px; }
    h1 { flex: 1 1 100%; }
    .grow { display: none; }
    #search { order: 1; flex: 1 1 100%; min-width: 0; }
    #slideBtn { order: 2; }
    .menu { order: 3; }
    #status { order: 4; }
    /* 手機版也維持靠右、垂直置中（沿用桌機 top:50% / translateY），只縮小一點 */
    .dock { right: 10px; }
    .dock-btn { width: 52px; min-height: 52px; }
  }
  h1 { font-size: 18px; margin: 0; letter-spacing: .06em; font-weight: 700; display: flex; align-items: center; gap: 9px; }
  h1 .logo-ico { width: 26px; height: 26px; object-fit: contain; border-radius: 6px; }
  h1 .sub { color: var(--muted); font-weight: 400; font-size: 12.5px; }
  .grow { flex: 1; }
  #status { font-size: 12px; color: var(--muted); }
  .btn {
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    padding: 9px 15px; border-radius: 999px; cursor: pointer; font-size: 13.5px;
    transition: .18s; white-space: nowrap; backdrop-filter: blur(6px);
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  .btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; }
  .btn.primary:hover { filter: brightness(1.05); color: #fff; }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn.icon { padding: 9px; width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center; }
  .btn.icon svg { width: 19px; height: 19px; display: block; }

  /* 設定下拉選單 */
  .menu { position: relative; }
  .menu-list {
    position: absolute; top: calc(100% + 8px); right: 0; min-width: 156px;
    background: var(--card-solid); border: 1px solid var(--line); border-radius: 12px;
    box-shadow: var(--shadow-lg); padding: 6px; z-index: 30;
    display: flex; flex-direction: column; gap: 2px;
  }
  .menu-list[hidden] { display: none; }
  .menu-item {
    border: none; background: none; color: var(--ink); text-align: left;
    padding: 9px 14px; border-radius: 8px; cursor: pointer; font-size: 13.5px;
    white-space: nowrap; transition: .15s;
  }
  .menu-item:hover { background: color-mix(in srgb, var(--accent) 16%, transparent); color: var(--accent); }
  .menu-item:disabled { opacity: .5; cursor: default; }
  #search {
    border: 1px solid var(--line); background: var(--card); color: var(--ink); backdrop-filter: blur(6px);
    padding: 9px 14px; border-radius: 999px; font-size: 13.5px; min-width: 150px; outline: none;
  }
  #search:focus { border-color: var(--accent); }

  main { padding: clamp(20px,3vw,40px) var(--gutter); }

  /* ---------- 首頁說明 ---------- */
  .intro { max-width: 600px; margin: 8vh auto; text-align: center; }
  .intro .logo { width: 64px; height: 64px; object-fit: contain; border-radius: 14px; filter: drop-shadow(0 4px 10px rgba(90,160,136,.4)); }
  .intro h2 { font-size: 25px; margin: 10px 0 20px; letter-spacing: .04em; }
  .why {
    text-align: left; background: var(--card); border: 1px solid var(--line); border-radius: 20px;
    padding: 24px 26px; box-shadow: var(--shadow); line-height: 1.9; font-size: 14.5px; backdrop-filter: blur(10px);
  }
  .why b { color: var(--accent); }
  .why p { margin: 0 0 13px; } .why p:last-child { margin-bottom: 0; }
  .intro .big { margin-top: 24px; font-size: 16px; padding: 13px 30px; box-shadow: var(--shadow); }
  .warn { font-size: 12px; color: var(--muted); margin-top: 22px; }

  /* ---------- 畫廊 ---------- */
  .grid {
    --min: 320px; --ar: 3/4; --pos: center 32%;
    max-width: 1800px; margin: 0 auto;
  }
  /* 依檔名排序：一般網格 */
  .grid.mode-name {
    display: grid; gap: clamp(8px,1vw,13px);
    grid-template-columns: repeat(auto-fill, minmax(var(--min), 1fr));
  }
  /* 寬大：寬版裁切，少欄、大張 */
  .grid.size-wide    { --min: 520px; --ar: 16/9;  --pos: center 30%; }
  /* 標準：正方形卡片 */
  .grid.size-std     { --min: 300px; --ar: 1/1;   --pos: center 32%; }
  /* 緊湊：正方形、多欄 */
  .grid.size-compact { --min: 200px; --ar: 1/1;   --pos: center 32%; }

  /* 依時間排序：左側垂直時間軸，依「月」分組 */
  .grid.mode-timeline { display: block; position: relative; padding-left: 40px; }
  .grid.mode-timeline::before {
    content: ""; position: absolute; left: 12px; top: 8px; bottom: 8px; width: 2px; border-radius: 2px;
    background: linear-gradient(var(--accent), color-mix(in srgb, var(--accent) 22%, transparent));
  }
  .tl-month { position: relative; margin-bottom: 56px; }
  .tl-month:last-child { margin-bottom: 0; }
  .tl-month::before {                       /* 軸線上的月份圓點 */
    content: ""; position: absolute; left: -37px; top: 5px; width: 20px; height: 20px; border-radius: 50%;
    box-sizing: border-box; background: var(--card-solid); border: 3px solid var(--accent);
    box-shadow: 0 2px 8px rgba(0,0,0,.12);
  }
  .tl-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 18px; }
  .tl-label { font-size: 21px; font-weight: 700; letter-spacing: .04em; }
  .tl-count { font-size: 13px; color: var(--muted); }
  .tl-grid {
    display: grid; gap: clamp(8px,1vw,13px);
    grid-template-columns: repeat(auto-fill, minmax(var(--min), 1fr));
  }
  .card {
    position: relative; border-radius: 9px; overflow: hidden; cursor: pointer;
    background: var(--card-solid); border: 1px solid var(--line); box-shadow: var(--shadow);
    transition: transform .2s cubic-bezier(.2,.7,.3,1), box-shadow .2s;
    animation: rise .5s both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
  .thumb {
    aspect-ratio: var(--ar, 3/4); position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: color-mix(in srgb, var(--accent) 12%, var(--card-solid));
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; object-position: var(--pos, center 32%); display: block; transition: transform .4s ease; }
  .card:hover .thumb img { transform: scale(1.04); }
  .thumb .spin {
    width: 30px; height: 30px; border: 3px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .thumb .ph { font-size: 13px; color: var(--muted); text-align: center; padding: 10px; }
  .badge {
    position: absolute; top: 11px; right: 11px; font-size: 10px; font-weight: 700; letter-spacing: .08em;
    padding: 4px 9px; border-radius: 6px; color: #fff;
    background: color-mix(in srgb, var(--accent) 82%, #000 8%);
    box-shadow: 0 2px 8px rgba(0,0,0,.18); z-index: 2;
  }
  .badge.image { background: color-mix(in srgb, var(--accent2) 82%, #000 8%); }
  .expand {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(.85);
    width: 76px; height: 76px; border-radius: 50%; border: none; cursor: pointer; color: #fff;
    display: flex; align-items: center; justify-content: center;
    background: rgba(40,55,50,.28); backdrop-filter: blur(3px); opacity: 0;
    transition: opacity .18s, transform .18s, background .18s; z-index: 2;
  }
  .expand svg { width: 38px; height: 38px; }
  .card:hover .expand { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  .expand:hover { background: var(--accent); transform: translate(-50%,-50%) scale(1.08); }
  .label {
    position: absolute; left: 0; right: 0; bottom: 0; display: flex; gap: 9px; align-items: flex-end;
    padding: 12px 14px; color: #fff;
    background: rgba(28,76,70,.42);
    backdrop-filter: blur(9px) saturate(1.15);
    -webkit-backdrop-filter: blur(9px) saturate(1.15);
    border-top: 1px solid rgba(255,255,255,.14);
  }
  .label .bar { flex: none; width: 3px; align-self: stretch; min-height: 26px; border-radius: 2px;
    background: var(--accent); box-shadow: 0 0 8px color-mix(in srgb, var(--accent) 60%, transparent); }
  .label .txt { min-width: 0; }
  .label .name { font-size: 13.5px; font-weight: 600; line-height: 1.35; text-shadow: 0 1px 2px rgba(0,0,0,.35);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .label .size { font-size: 11px; opacity: .78; margin-top: 3px; }
  .empty { text-align: center; color: var(--muted); padding: 12vh 0; }
  .hidden { display: none !important; }

  /* ---------- 側邊浮動按鈕 ---------- */
  .dock {
    position: fixed; z-index: 25; right: clamp(8px,1.6vw,22px); top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 10px;
  }
  .dock[hidden] { display: none; }
  .dock-btn {
    width: 60px; min-height: 60px; border-radius: 16px; cursor: pointer;
    border: 1px solid var(--line); background: color-mix(in srgb, var(--card-solid) 86%, transparent);
    color: var(--ink); box-shadow: var(--shadow); backdrop-filter: blur(8px);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    transition: .18s;
  }
  .dock-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .dock-btn.active { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 14%, var(--card-solid)); }
  .dock-btn svg { width: 20px; height: 20px; }
  .dock-lbl { font-size: 10.5px; font-weight: 600; letter-spacing: .02em; }

  /* ---------- 燈箱 / 幻燈片 ---------- */
  #viewer {
    position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center;
    background: rgba(15,55,54,.9); padding: clamp(14px,3vw,40px);
  }
  #viewer.show { display: flex; animation: fade .25s; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 14px; max-width: 100%; max-height: 100%; }
  .stage .frame {
    background: var(--card-solid); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow-lg);
    border: 1px solid var(--line); display: flex; align-items: center; justify-content: center;
  }
  .stage img { display: block; max-width: 94vw; max-height: 80vh; object-fit: contain; cursor: pointer; }
  .stage .cap { text-align: center; color: #eef6f2; text-shadow: 0 1px 3px rgba(0,0,0,.4); }
  .stage .cap .t { font-size: 17px; font-weight: 600; }
  .stage .cap .i { font-size: 12.5px; color: var(--muted); margin-top: 3px; }
  .vbtns { display: flex; gap: 10px; align-items: center; }
  /* 控制項用半透明實底，不再各自開毛玻璃（避免疊在已模糊的覆蓋層上造成閃動） */
  .vnav {
    position: absolute; top: 50%; transform: translateY(-50%); width: 52px; height: 52px; border-radius: 50%;
    border: 1px solid var(--line); background: var(--card-solid); color: var(--ink); cursor: pointer; font-size: 22px;
    transition: .18s;
  }
  .vnav:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .vnav.prev { left: clamp(10px,3vw,40px); } .vnav.next { right: clamp(10px,3vw,40px); }
  .vclose { position: absolute; top: 18px; right: 20px; width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid var(--line); background: var(--card-solid); color: var(--ink); cursor: pointer; font-size: 20px; }
  .vclose:hover { background: var(--accent); color: #fff; }
  .vcount { position: absolute; top: 22px; left: 24px; color: var(--ink); font-size: 13px; background: var(--card-solid);
    padding: 6px 13px; border-radius: 999px; border: 1px solid var(--line); }
  #viewer .btn { backdrop-filter: none; background: var(--card-solid); }
  #viewer .btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  body.no-scroll { overflow: hidden; }
</style>
</head>
<body>
<header class="hidden" id="bar">
  <h1><img class="logo-ico" src="favicon.png" alt="">織圖圖書館 <span class="sub" id="count"></span></h1>
  <span id="status"></span>
  <div class="grow"></div>
  <input id="search" type="search" placeholder="搜尋名稱…" autocomplete="off">
  <button class="btn icon" id="slideBtn" title="幻燈片：從第一張開始瀏覽"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M10 8.5v3l3-1.5-3-1.5z" fill="currentColor"/><path d="M8 21h8"/><path d="M12 17v4"/></svg></button>
  <div class="menu">
    <button class="btn icon" id="settingsBtn" title="設定" aria-haspopup="true" aria-expanded="false"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    <div class="menu-list" id="settingsList" hidden>
      <button class="menu-item" id="refresh" title="新增或刪除檔案後，按這裡重新掃描並補上新封面">重新整理</button>
      <button class="menu-item" id="rechoose" title="改選其他資料夾">更換資料夾</button>
    </div>
  </div>
</header>

<!-- 側邊浮動按鈕 -->
<div class="dock" id="dock" hidden>
  <button class="dock-btn" id="sizeBtn" title="調整預覽大小">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.4"/><rect x="14" y="3" width="7" height="7" rx="1.4"/><rect x="14" y="14" width="7" height="7" rx="1.4"/><rect x="3" y="14" width="7" height="7" rx="1.4"/></svg>
    <span class="dock-lbl" id="sizeLbl">寬大</span>
  </button>
  <button class="dock-btn" id="sortBtn" title="切換排序：檔名 ／ 時間">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/></svg>
    <span class="dock-lbl" id="sortLbl">檔名</span>
  </button>
</div>

<main>
  <div class="intro hidden" id="intro">
    <img class="logo" src="favicon.png" alt="">
    <h2>編織圖圖書館</h2>
    <div class="why">
      <p>第一次使用，請按下面的按鈕，選取要預覽的資料夾。</p>
      <p>基於瀏覽器的安全規定，網頁<b>不能自己讀取你電腦裡的檔案</b>，必須由你親自授權一次，網頁才能讀到檔案。</p>
      <p>授權過後，所有封面會畫好並<b>存進快取</b>。之後再打開這個網頁會<b>自動載入，不必再選資料夾</b>。<br>
         只有當你<b>新增或刪除檔案</b>時，才需要點右上角的<b>設定</b>齒輪，選「重新整理」再選一次，補上新封面。</p>
    </div>
    <button class="btn primary big" id="pickBtn">選擇資料夾</button>
    <p class="warn">※ 請使用 Chrome 或 Edge 開啟。所有檔案只在你電腦本機讀取，不會上傳到任何地方。</p>
  </div>

  <div class="grid hidden" id="grid"></div>
  <div class="empty hidden" id="empty"></div>
</main>

<!-- 燈箱 / 幻燈片 -->
<div id="viewer">
  <button class="vclose" id="vClose" title="關閉 (Esc)">✕</button>
  <div class="vcount" id="vCount"></div>
  <button class="vnav prev" id="vPrev" title="上一張 (←)">‹</button>
  <div class="stage">
    <div class="frame"><img id="vImg" alt=""></div>
    <div class="cap"><div class="t" id="vTitle"></div></div>
    <div class="vbtns">
      <button class="btn primary" id="vOpen">開啟檔案</button>
    </div>
  </div>
  <button class="vnav next" id="vNext" title="下一張 (→)">›</button>
</div>

<script src="./lib/pdf.min.js"></script>
<script>
const pdfjsLib = globalThis.pdfjsLib;
pdfjsLib.GlobalWorkerOptions.workerSrc = "./lib/pdf.worker.min.js";

const IMG_EXT = new Set(["png","jpg","jpeg","webp","gif","bmp"]);
const THUMB_W = 600;        // 封面解析度（大圖也清楚）

// ---------- 迷你 IndexedDB ----------
const DB = (() => {
  let p;
  const STORES = ["thumbs", "kv"];
  const ensureStores = db => STORES.forEach(s => { if (!db.objectStoreNames.contains(s)) db.createObjectStore(s); });
  const hasStores = db => STORES.every(s => db.objectStoreNames.contains(s));
  // 不指定版本開啟：沿用瀏覽器現有版本，避免「舊資料庫版本較新 → open 直接失敗 → 每次都要重選資料夾」。
  // 若現有資料庫缺少需要的 store，再升一版補建。
  const open = () => (p ||= new Promise((res, rej) => {
    const r = indexedDB.open("weaving-lib");
    r.onupgradeneeded = () => ensureStores(r.result);
    r.onblocked = () => console.warn("[lib] IndexedDB 被其他分頁鎖住，請關閉其他開著本頁的分頁。");
    r.onerror = () => rej(r.error);
    r.onsuccess = () => {
      const db = r.result;
      if (hasStores(db)) return res(db);
      const v = db.version + 1; db.close();                 // 缺 store：升版補建
      const r2 = indexedDB.open("weaving-lib", v);
      r2.onupgradeneeded = () => ensureStores(r2.result);
      r2.onerror = () => rej(r2.error);
      r2.onsuccess = () => res(r2.result);
    };
  }));
  const tx = async (store, mode, fn) => { const db = await open();
    return new Promise((res, rej) => { const t = db.transaction(store, mode); const req = fn(t.objectStore(store));
      t.oncomplete = () => res(req?.result); t.onerror = () => rej(t.error); }); };
  return { get: (s, k) => tx(s, "readonly", o => o.get(k)), set: (s, k, v) => tx(s, "readwrite", o => o.put(v, k)) };
})();

const $ = id => document.getElementById(id);
const grid = $("grid"), intro = $("intro"), bar = $("bar"), empty = $("empty"), status = $("status"), dock = $("dock");
let items = [];
let dirHandle = null;
let sortMode = localStorage.getItem("wlib-sort") === "time" ? "time" : "name";   // "name"=檔名, "time"=時間

const thumbKey = it => `${it.name}|${it.size}|${it.lastModified}|w${THUMB_W}`;

$("pickBtn").onclick = () => start(true);
$("refresh").onclick = () => { closeSettings(); start(false); };
$("rechoose").onclick = () => { closeSettings(); start(true); };
$("search").oninput = applyFilter;
$("sizeBtn").onclick = cycleSize;
$("slideBtn").onclick = () => openViewer(0);
$("sortBtn").onclick = () => {
  sortMode = sortMode === "time" ? "name" : "time";
  localStorage.setItem("wlib-sort", sortMode);
  updateSortBtn();
  render();
};
function updateSortBtn() {
  $("sortLbl").textContent = sortMode === "time" ? "時間" : "檔名";
  $("sortBtn").classList.toggle("active", sortMode === "time");
  $("sortBtn").title = sortMode === "time" ? "目前：依時間 ／ 點擊改依檔名" : "目前：依檔名 ／ 點擊改依時間";
}
updateSortBtn();

// 設定下拉選單
function closeSettings() {
  $("settingsList").hidden = true;
  $("settingsBtn").setAttribute("aria-expanded", "false");
}
$("settingsBtn").onclick = (e) => {
  e.stopPropagation();
  const open = $("settingsList").hidden;
  $("settingsList").hidden = !open;
  $("settingsBtn").setAttribute("aria-expanded", String(open));
};
document.addEventListener("click", (e) => {
  if (!$("settingsList").hidden && !e.target.closest(".menu")) closeSettings();
});
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeSettings(); });

// 捲動時：往下滑收起 Header，往上滑一點或回到最頂端時再顯示
let lastScrollY = 0;
window.addEventListener("scroll", () => {
  const y = window.scrollY;
  if (y <= 4) {
    bar.classList.remove("nav-hidden");          // 最頂端一律顯示
  } else if (y > lastScrollY + 4) {
    bar.classList.add("nav-hidden");             // 往下滑：收起
    closeSettings();
  } else if (y < lastScrollY - 4) {
    bar.classList.remove("nav-hidden");          // 往上滑：顯示
  }
  lastScrollY = y;
}, { passive: true });

// 預覽大小（欄數 + 裁切比例）
const SIZES = [["寬大","size-wide"],["標準","size-std"],["緊湊","size-compact"]];
let sizeIdx = +(localStorage.getItem("wlib-size") ?? 0);
if (!(sizeIdx >= 0 && sizeIdx < SIZES.length)) sizeIdx = 0;
function applySize() {
  const [name, cls] = SIZES[sizeIdx];
  grid.classList.remove("size-wide","size-std","size-compact");
  grid.classList.add(cls);
  $("sizeLbl").textContent = name;
}
function cycleSize() { sizeIdx = (sizeIdx + 1) % SIZES.length; localStorage.setItem("wlib-size", sizeIdx); applySize(); }
applySize();

init();

async function init() {
  if (!window.indexedDB || !window.showDirectoryPicker) {
    showIntro();
    intro.querySelector(".warn").innerHTML = "⚠ 你的瀏覽器不支援讀取本機資料夾，請改用 <b>Chrome</b> 或 <b>Edge</b> 開啟本頁。";
    $("pickBtn").disabled = true; return;
  }
  let meta = null;
  try { meta = await DB.get("kv", "items"); } catch (e) { console.warn("[lib] 讀取快取清單失敗：", e); }
  try { dirHandle = await DB.get("kv", "dir"); } catch (e) { console.warn("[lib] 讀取資料夾把手失敗：", e); }
  if (meta && meta.length) { items = meta; showLibrary(); render(); fillThumbsFromCache(); }
  else showIntro();
}

function showIntro() { intro.classList.remove("hidden"); bar.classList.add("hidden"); grid.classList.add("hidden"); dock.hidden = true; }
function showLibrary() {
  intro.classList.add("hidden"); bar.classList.remove("hidden"); dock.hidden = false;
  $("count").textContent = `（${items.length} 件）`;
  empty.classList.toggle("hidden", items.length > 0);
  if (!items.length) empty.textContent = "資料夾裡沒有 PDF 或圖片。";
  grid.classList.toggle("hidden", items.length === 0);
}

async function ensureRead(h) {
  if (!h) return false;
  if (await h.queryPermission({ mode: "read" }) === "granted") return true;
  return await h.requestPermission({ mode: "read" }) === "granted";
}

async function getHandle(forcePick) {
  if (!forcePick && await ensureRead(dirHandle)) return dirHandle;
  return await window.showDirectoryPicker({ id: "weaving-folder", mode: "read" });
}

async function start(forcePick) {
  let handle;
  try { handle = await getHandle(forcePick); } catch (e) { return; }
  dirHandle = handle;
  try { await DB.set("kv", "dir", handle); } catch (e) { console.warn("[lib] 無法儲存資料夾把手：", e); }

  status.textContent = "讀取資料夾…";
  const found = [];
  for await (const entry of handle.values()) {
    if (entry.kind !== "file") continue;
    const dot = entry.name.lastIndexOf("."); if (dot < 0) continue;
    const ext = entry.name.slice(dot + 1).toLowerCase();
    if (ext === "pdf") found.push({ entry, ext, type: "pdf" });
    else if (IMG_EXT.has(ext)) found.push({ entry, ext, type: "image" });
  }
  found.sort((a, b) => a.entry.name.localeCompare(b.entry.name, "zh-Hant", { numeric: true }));
  // 先抓每個檔案的 size/lastModified（只讀 metadata，不讀內容，很快），
  // 才能在畫封面前就把完整清單寫進快取，且讓 thumbKey 對得上快取。
  items = await Promise.all(found.map(async f => {
    let size, lastModified;
    try { const file = await f.entry.getFile(); size = file.size; lastModified = file.lastModified; } catch (_) {}
    return { name: f.entry.name, ext: f.ext, type: f.type, size, lastModified, _entry: f.entry };
  }));

  // 立刻存清單：即使封面還沒畫完就重新整理／關頁，下次也能直接載入，免重選資料夾。
  await persistItems();

  showLibrary(); render();
  await generateThumbs();
  status.textContent = "";
}

async function persistItems() {
  const meta = items.map(({ name, ext, type, size, lastModified }) => ({ name, ext, type, size, lastModified }));
  try { await DB.set("kv", "items", meta); }
  catch (e) {
    console.warn("[lib] 無法寫入清單到 IndexedDB：", e);
    status.textContent = "⚠ 無法寫入快取，重新整理後可能需要重選資料夾";
  }
}

// 卡片只建立一次（保留已畫好的封面），重排時重新搬移既有節點。
function ensureCards() {
  items.forEach((it) => {
    if (it._card) return;
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.name = it.name.toLowerCase();
    card.innerHTML =
      `<div class="thumb"><div class="spin"></div>` +
      `<span class="badge ${it.type}">${it.type === "pdf" ? "PDF" : it.ext.toUpperCase()}</span>` +
      `<button class="expand" title="放大預覽"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></button>` +
      `<div class="label"><span class="bar"></span><div class="txt">` +
      `<div class="name">${escapeHtml(prettyTitle(it.name))}</div>` +
      `<div class="size">${it.size ? humanSize(it.size) : ""}</div></div></div></div>`;
    card.onclick = () => openFile(it);
    card.querySelector(".expand").onclick = (e) => { e.stopPropagation(); openViewer(visibleIndexOf(it)); };
    card.__item = it;
    it._card = card;
  });
}

const byName = (a, b) => a.name.localeCompare(b.name, "zh-Hant", { numeric: true });

function render() {
  ensureCards();
  grid.innerHTML = "";
  grid.classList.toggle("mode-timeline", sortMode === "time");
  grid.classList.toggle("mode-name", sortMode !== "time");
  if (sortMode === "time") renderTimeline(); else renderFlat();
  applyFilter();
}

function renderFlat() {
  items.slice().sort(byName).forEach((it, i) => {
    it._card.style.animationDelay = Math.min(i * 22, 600) + "ms";
    grid.appendChild(it._card);
  });
}

// 依時間（lastModified，新→舊）分月；只有有檔案的月份才建立區塊，空月自動跳過。
function renderTimeline() {
  const arr = items.slice().sort((a, b) => (b.lastModified || 0) - (a.lastModified || 0));
  let curKey = null, curGrid = null, i = 0;
  arr.forEach((it) => {
    const d = it.lastModified ? new Date(it.lastModified) : null;
    const key = d ? `${d.getFullYear()}-${d.getMonth()}` : "?";
    if (key !== curKey) {
      curKey = key;
      const month = document.createElement("div"); month.className = "tl-month";
      const head = document.createElement("div"); head.className = "tl-head";
      head.innerHTML = `<span class="tl-label">${d ? `${d.getFullYear()} 年 ${d.getMonth() + 1} 月` : "無日期"}</span>`;
      curGrid = document.createElement("div"); curGrid.className = "tl-grid";
      month.appendChild(head); month.appendChild(curGrid); grid.appendChild(month);
    }
    it._card.style.animationDelay = Math.min(i * 12, 480) + "ms";
    curGrid.appendChild(it._card); i++;
  });
}

async function fillThumbsFromCache() {
  for (const it of items) {
    let blob = null; try { blob = await DB.get("thumbs", thumbKey(it)); } catch (_) {}
    if (blob) paint(it, blob); else placeholder(it, "封面待產生");
  }
}

async function generateThumbs() {
  let done = 0; status.textContent = `產生封面… 0/${items.length}`;
  const queue = [...items];
  const worker = async () => {
    while (queue.length) {
      const it = queue.shift();
      try { await makeThumb(it); } catch (e) { placeholder(it, "⚠ 無法產生封面"); }
      done++; status.textContent = `產生封面… ${done}/${items.length}`;
    }
  };
  await Promise.all(Array.from({ length: 3 }, worker));
  status.textContent = "";
}

async function makeThumb(it) {
  const file = await it._entry.getFile();
  it.size = file.size; it.lastModified = file.lastModified;
  const sizeEl = it._card.querySelector(".size"); if (sizeEl) sizeEl.textContent = humanSize(file.size);
  const key = thumbKey(it);
  let blob = null; try { blob = await DB.get("thumbs", key); } catch (_) {}
  if (!blob) {
    blob = it.type === "image" ? await downscaleImage(file) : await renderPdfCover(file);
    if (blob) { try { await DB.set("thumbs", key, blob); } catch (_) {} }
  }
  if (blob) paint(it, blob); else placeholder(it, it.type === "pdf" ? "PDF" : "圖片");
}

function paint(it, blob) {
  const url = URL.createObjectURL(blob); it._thumbUrl = url;
  const img = new Image();
  img.onload = () => { const t = it._card.querySelector(".thumb");
    t.querySelector(".spin")?.remove(); t.querySelector(".ph")?.remove();
    if (!t.querySelector("img")) t.insertBefore(img, t.querySelector(".badge")); };
  img.src = url;
}
function placeholder(it, text) {
  const t = it._card.querySelector(".thumb"); t.querySelector(".spin")?.remove();
  if (!t.querySelector("img") && !t.querySelector(".ph")) t.insertAdjacentHTML("afterbegin", `<div class="ph">${text}</div>`);
}

async function renderPdfCover(file) {
  const data = new Uint8Array(await file.arrayBuffer());
  const doc = await pdfjsLib.getDocument({ data, disableAutoFetch: true, disableStream: true }).promise;
  try {
    const page = await doc.getPage(1);
    const base = page.getViewport({ scale: 1 });
    const viewport = page.getViewport({ scale: THUMB_W / base.width });
    const canvas = document.createElement("canvas");
    canvas.width = Math.ceil(viewport.width); canvas.height = Math.ceil(viewport.height);
    const ctx = canvas.getContext("2d"); ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    await page.render({ canvasContext: ctx, viewport }).promise;
    return await new Promise(r => canvas.toBlob(r, "image/jpeg", 0.85));
  } finally { await doc.destroy(); }
}
async function downscaleImage(file) {
  const bmp = await createImageBitmap(file).catch(() => null); if (!bmp) return file;
  const scale = Math.min(1, (THUMB_W * 1.6) / bmp.width);
  const w = Math.round(bmp.width * scale), h = Math.round(bmp.height * scale);
  const canvas = document.createElement("canvas"); canvas.width = w; canvas.height = h;
  canvas.getContext("2d").drawImage(bmp, 0, 0, w, h); bmp.close();
  return await new Promise(r => canvas.toBlob(r, "image/jpeg", 0.88));
}

async function openFile(it) {
  try {
    let fh = it._entry;          // 本次有掃描資料夾時直接用
    if (!fh) {                   // 純從快取載入時，用一開始選的資料夾把手重新取得
      if (!await ensureRead(dirHandle)) { alert("請先選擇放編織圖的資料夾。"); return; }
      fh = await dirHandle.getFileHandle(it.name);
      it._entry = fh;
    }
    const file = await fh.getFile();
    const url = URL.createObjectURL(file);
    const win = window.open(url, "_blank");
    if (!win) location.href = url;
    setTimeout(() => URL.revokeObjectURL(url), 60000);
  } catch (e) {
    alert("無法開啟檔案：" + (e && e.message ? e.message : e));
  }
}

function applyFilter() {
  const q = $("search").value.trim().toLowerCase(); let shown = 0;
  for (const it of items) { const hit = !q || it.name.toLowerCase().includes(q);
    it._card.classList.toggle("hidden", !hit); if (hit) shown++; }
  // 時間軸模式：把篩選後沒有任何可見卡片的月份整塊收起，避免留白
  if (sortMode === "time") {
    grid.querySelectorAll(".tl-month").forEach(m => {
      m.classList.toggle("hidden", !m.querySelector(".tl-grid > .card:not(.hidden)"));
    });
  }
  if (items.length) { empty.classList.toggle("hidden", shown > 0); if (!shown) empty.textContent = "找不到符合的檔案。"; }
}

// ---------- 燈箱 / 幻燈片 ----------
const viewer = $("viewer");
let vList = [], vIdx = 0;
// 依目前畫面上的實際排列順序（含時間軸分組）取可見項目
const visible = () => [...grid.querySelectorAll(".card:not(.hidden)")].map(c => c.__item);
const visibleIndexOf = it => visible().indexOf(it);

function openViewer(idx) {
  vList = visible(); if (!vList.length) return;
  vIdx = Math.max(0, idx); viewer.classList.add("show"); document.body.classList.add("no-scroll"); showSlide();
}
function showSlide() {
  const it = vList[vIdx]; if (!it) return;
  $("vImg").src = it._thumbUrl || "";
  $("vTitle").textContent = prettyTitle(it.name);
  $("vCount").textContent = `${vIdx + 1} / ${vList.length}`;
  $("vOpen").onclick = () => openFile(it);
}
function step(d) { vIdx = (vIdx + d + vList.length) % vList.length; showSlide(); }
function closeViewer() { viewer.classList.remove("show"); document.body.classList.remove("no-scroll"); }

$("vPrev").onclick = () => step(-1);
$("vNext").onclick = () => step(1);
$("vClose").onclick = closeViewer;
viewer.onclick = (e) => { if (e.target === viewer) closeViewer(); };
$("vImg").onclick = () => { const it = vList[vIdx]; if (it) openFile(it); };
document.addEventListener("keydown", (e) => {
  if (!viewer.classList.contains("show")) return;
  if (e.key === "Escape") closeViewer();
  else if (e.key === "ArrowLeft") step(-1);
  else if (e.key === "ArrowRight") step(1);
});

function prettyTitle(name) { return name.replace(/\.[^.]+$/, "").replace(/[_\-]+/g, " ").replace(/\s+/g, " ").trim(); }
function escapeHtml(s) { return s.replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }
function humanSize(n) { return n < 1024 ? n + " B" : n < 1048576 ? (n/1024).toFixed(0) + " KB" : (n/1048576).toFixed(1) + " MB"; }
</script>
